task_retrieval:
  description: >
    Exécute une SEULE recherche sur l'API ArXiv pour les thématiques : {topics}.
    Récupère exactement {max_results} résultats. 
    Pour chaque papier, extrait : titre, abstract complet, date et URL du PDF.
    Une fois les données obtenues, arrête la recherche immédiatement.
  expected_output: >
    Une liste brute contenant le titre, l'abstract, la date et l'URL pour chaque papier trouvé.
  agent: researcher
  
task_analyse:
  description: >
    Utilise EXCLUSIVEMENT les abstracts fournis par le researcher. 
    Pour chaque papier : identifie la problématique, la solution technique et les métriques.
    Rédige le rapport final en Français. 
    Ne demande pas de recherches supplémentaires.
  expected_output: >
    Un rapport Markdown structuré avec : Titre, Fiche technique (10 lignes max), et Lien PDF.
  agent: analyst